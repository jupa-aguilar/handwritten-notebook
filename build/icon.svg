  <path d="M 512 402 C 584 372 684 372 750 392 L 750 652 C 684 632 584 632 512 662 Z"
        fill="url(#pageR)"/>
  <rect x="496" y="380" width="32" height="278" fill="url(#spine)"/>

  <!-- search-highlight detail -->
  <rect x="556" y="475" width="152" height="42" rx="12" fill="#ffd98a"/>

  <!-- handwriting: left page -->
  <g stroke="#6c6256" stroke-width="15" stroke-linecap="round" fill="none">
    <path d="M 312 448 q 38 -14 76 -2 t 78 -2"/>
    <path d="M 312 498 q 44 -12 84 0 t 66 -4"/>
    <path d="M 312 548 q 36 -12 72 0 t 84 -4"/>
    <path d="M 312 598 q 40 -10 66 -2"/>
  </g>

  <!-- handwriting: right page -->
  <g stroke="#6c6256" stroke-width="15" stroke-linecap="round" fill="none">
    <path d="M 556 446 q 42 -14 80 -2 t 76 0"/>
    <path d="M 566 496 q 38 -10 68 0 t 64 -4"/>
    <path d="M 556 546 q 44 -12 82 0 t 74 -4"/>
    <path d="M 556 596 q 36 -10 88 -4"/>
