<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f3831"/>
      <stop offset="1" stop-color="#211d1a"/>
    </linearGradient>
    <linearGradient id="pageL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#efe8d9"/>
      <stop offset="0.82" stop-color="#f7f3ea"/>
      <stop offset="1" stop-color="#d9cfba"/>
    </linearGradient>
    <linearGradient id="pageR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d9cfba"/>
      <stop offset="0.18" stop-color="#f7f3ea"/>
      <stop offset="1" stop-color="#efe8d9"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8a7d6c" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#5d5142" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8a7d6c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- macOS squircle -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bg)"/>

  <!-- cover -->
  <rect x="230" y="360" width="564" height="342" rx="30" fill="#c8743c"/>
  <rect x="230" y="360" width="564" height="342" rx="30" fill="#000" opacity="0.12"/>

  <!-- pages -->
  <path d="M 512 402 C 440 372 340 372 274 392 L 274 652 C 340 632 440 632 512 662 Z"
